<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SALON TAB</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#080710;--accent:#7B6EF6;--accent2:#C4A96D;--text:rgba(255,255,255,0.88);--muted:rgba(255,255,255,0.4);--green:#2DD4A0;--border:rgba(255,255,255,0.08);}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;}
.app{display:flex;flex-direction:column;height:100%;width:100%;max-width:500px;margin:0 auto;}
.hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);background:rgba(8,7,16,0.98);flex-shrink:0;}
.av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#2a1f5e,#534AB7);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0;}
.hdr-info{flex:1;min-width:0;}
.hdr-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
.hdr-role{font-size:10px;color:var(--muted);margin-top:1px;text-transform:uppercase;letter-spacing:.06em;}
.badge{display:inline-flex;align-items:center;gap:4px;background:rgba(45,212,160,0.1);border:1px solid rgba(45,212,160,0.2);border-radius:20px;padding:2px 8px;font-size:9px;color:var(--green);margin-top:3px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);}
.mic{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mic.on{border-color:var(--accent);background:rgba(123,110,246,0.15);}
.chat{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;display:flex;flex-direction:column;gap:12px;}
.row{display:flex;gap:8px;width:100%;}
.row.me{flex-direction:row-reverse;}
.ava{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#2a1f5e,#534AB7);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;margin-top:2px;}
.ava.u{background:#111;border-color:rgba(255,255,255,0.1);}
.body{max-width:calc(100% - 42px);display:flex;flex-direction:column;gap:4px;min-width:0;}
.row.me .body{align-items:flex-end;}
.bub{padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.55;word-break:break-word;overflow-wrap:break-word;}
.bub.ai{background:#12102a;border:1px solid rgba(123,110,246,0.15);border-radius:4px 16px 16px 16px;}
.bub.me{background:var(--accent);color:#fff;border-radius:16px 4px 16px 16px;}
.t{font-size:9px;color:var(--muted);}
.dots{background:#12102a;border:1px solid rgba(123,110,246,0.15);border-radius:4px 16px 16px 16px;padding:10px 14px;display:flex;gap:4px;align-items:center;}
.d{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.3;animation:blink .9s infinite;}
.d:nth-child(2){animation-delay:.15s;}.d:nth-child(3){animation-delay:.3s;}
@keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}
.card{background:#0a0920;border:1px solid rgba(196,169,109,0.2);border-radius:10px;margin-top:4px;overflow:hidden;width:100%;}
.ch{padding:12px 14px 8px;border-bottom:1px solid rgba(196,169,109,0.1);}
.cn{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.ca{font-size:9px;color:var(--accent2);margin-top:2px;}
.cb{padding:10px 14px;}
.cr{display:flex;gap:6px;margin-bottom:6px;font-size:11px;color:var(--muted);}
.cv{color:var(--text);}
.ns{padding:8px 14px 12px;border-top:1px solid var(--border);}
.nl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.ni{display:flex;align-items:center;justify-content:space-between;font-size:11px;margin-bottom:4px;}
.nt{font-size:9px;padding:2px 6px;border-radius:8px;}
.nt.bar{background:rgba(196,169,109,0.1);color:var(--accent2);}
.nt.cigar{background:rgba(123,110,246,0.1);color:#AFA9EC;}
.chips{padding:6px 16px;display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;overflow:hidden;}
.chip{font-size:11px;padding:7px 13px;border-radius:20px;border:1px solid rgba(123,110,246,0.35);color:rgba(175,169,236,0.85);background:rgba(123,110,246,0.06);cursor:pointer;white-space:nowrap;font-family:'DM Mono',monospace;}
.chip:active{background:rgba(123,110,246,0.2);}
.inp{padding:10px 16px 28px;border-top:1px solid var(--border);background:rgba(8,7,16,0.98);flex-shrink:0;}
.irow{display:flex;gap:8px;align-items:center;}
input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:22px;padding:11px 16px;font-size:14px;color:var(--text);outline:none;font-family:'DM Mono',monospace;min-width:0;-webkit-appearance:none;}
input::placeholder{color:var(--muted);}
input:focus{border-color:rgba(123,110,246,0.5);}
.snd{width:42px;height:42px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.snd:disabled{opacity:.4;}
.div{display:flex;align-items:center;gap:8px;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.div::before,.div::after{content:'';flex:1;height:1px;background:var(--border);}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="av">R</div>
    <div class="hdr-info">
      <div class="hdr-name">Ryō</div>
      <div class="hdr-role">AI Stylist · SALON TAB · Tokyo</div>
      <div class="badge"><div class="dot"></div>Claude API · Live</div>
    </div>
    <button class="mic" id="mic" onclick="toggleVoice()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0014 0"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
  </div>
  <div class="chat" id="chat">
    <div class="div">SALON TAB · AI Concierge Demo</div>
    <div class="row">
      <div class="ava">R</div>
      <div class="body">
        <div class="bub ai">Hey. I'm Ryō — your Tokyo style concierge.<br><br>Tell me what look you're going for. I'll find the right barber — and where to go after.</div>
        <div class="t">Now</div>
      </div>
    </div>
  </div>
  <div class="chips" id="chips">
    <button class="chip" onclick="sc(this)">Sharp fade, Tokyo style</button>
    <button class="chip" onclick="sc(this)">Best cigar bar in Tokyo?</button>
    <button class="chip" onclick="sc(this)">Specialty coffee nearby?</button>
    <button class="chip" onclick="sc(this)">日本語OK？</button>
  </div>
  <div class="inp">
    <div class="irow">
      <input id="inp" placeholder="Tell Ryō what you're looking for..." onkeydown="if(event.key==='Enter')send()">
      <button class="snd" id="snd" onclick="send()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="white" stroke="none"/></svg>
      </button>
    </div>
  </div>
</div>
<script>
const SYS=`You are Ryo, a cool AI stylist concierge for SALON TAB in Tokyo.
Personality: calm, confident, slightly dry. Tokyo local vibes. Direct but warm. Respond in Japanese or English per user.
Barbershop: Skin fade, Taper, Two-block, Hot towel shave, Riyoushitsu 3-6k yen, Barber 5-15k yen. No tipping.
Coffee: Glitch Coffee Jimbocho (Kiyokazu Suzuki, AeroPress Champion 2014, single-origin, some cups 3500 yen), Onibus, Fuglen, Blue Bottle.
Bars: Bar El Laguito Arakicho (Honda-san, cabinet ministers and Aso frequent, cigar bar, women-only groups declined), Bar Benfiddich, SG Club, Zoetrope 300+ Japanese whiskies. Arakicho is Tokyo best hidden bar district.
Rules: 2-4 sentences max. After recommending:
[CARD]{"name":"X","area":"Y","specialty":"Z","price":"X-Y yen","nearby":[{"name":"A","type":"whisky"}]}[/CARD]`;
let msgs=[],von=false;
function toggleVoice(){von=!von;document.getElementById('mic').classList.toggle('on',von);}
function spk(t){if(!von||!speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t.replace(/\[CARD\][\s\S]*?\[\/CARD\]/g,'').trim());u.lang='en-US';u.rate=0.9;u.pitch=0.82;speechSynthesis.speak(u);}
function ts(){return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
function addMsg(r,t,c){
  const chat=document.getElementById('chat');
  const clean=t.replace(/\[CARD\][\s\S]*?\[\/CARD\]/g,'').trim();
  const d=document.createElement('div');d.className='row'+(r==='user'?' me':'');
  let ch='';
  if(c){
    const nb=c.nearby?c.nearby.map(n=>`<div class="ni"><span>${n.name}</span><span class="nt ${n.type==='cigar'?'cigar':'bar'}">${n.type}</span></div>`).join(''):'';
    ch=`<div class="card"><div class="ch"><div class="cn">${c.name}</div><div class="ca">📍 ${c.area} · Tokyo</div></div><div class="cb"><div class="cr"><span>✂️</span><span class="cv">${c.specialty}</span></div><div class="cr"><span>💴</span><span class="cv">${c.price}</span></div></div>${nb?`<div class="ns"><div class="nl">Nearby tonight</div>${nb}</div>`:''}</div>`;
  }
  d.innerHTML=`<div class="ava ${r==='user'?'u':''}">${r==='user'?'U':'R'}</div><div class="body"><div class="bub ${r==='user'?'me':'ai'}">${clean.replace(/\n/g,'<br>')}</div>${ch}<div class="t">${ts()}</div></div>`;
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
function addTyping(){const chat=document.getElementById('chat');const d=document.createElement('div');d.className='row';d.id='typing';d.innerHTML=`<div class="ava">R</div><div class="body"><div class="dots"><div class="d"></div><div class="d"></div><div class="d"></div></div></div>`;chat.appendChild(d);chat.scrollTop=chat.scrollHeight;}
async function send(){
  const inp=document.getElementById('inp');const t=inp.value.trim();if(!t)return;
  inp.value='';document.getElementById('snd').disabled=true;
  document.getElementById('chips').style.display='none';
  addMsg('user',t,null);msgs.push({role:'user',content:t});addTyping();
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,messages:msgs})});
    const data=await res.json();
    document.getElementById('typing')?.remove();
    const reply=data.content?.[0]?.text||'Sorry, connection issue.';
    let card=null;const m=reply.match(/\[CARD\]([\s\S]*?)\[\/CARD\]/);
    if(m){try{card=JSON.parse(m[1].trim());}catch{}}
    msgs.push({role:'assistant',content:reply});addMsg('assistant',reply,card);spk(reply);
  }catch(e){document.getElementById('typing')?.remove();addMsg('assistant','Connection error.',null);}
  document.getElementById('snd').disabled=false;
}
function sc(el){document.getElementById('inp').value=el.textContent;send();}
speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
</script>
</body>
</html>
