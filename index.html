<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SALON TAB — Ryō AI Stylist</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080710;--border:rgba(255,255,255,0.07);--accent:#7B6EF6;--accent2:#C4A96D;--text:rgba(255,255,255,0.88);--muted:rgba(255,255,255,0.35);--green:#2DD4A0;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow:hidden;}
https://raw.githubusercontent.com/takefuminitta-dev/salontab-demo/main/u3966117843_Cinematic_interior_photograph_of_a_luxury_Japanes_5c6ace17-15e7-424c-a49d-50a76c1d4703_2.png.bg-overlay{position:fixed;inset:0;z-index:1;background:linear-gradient(to bottom,rgba(8,7,16,0.75) 0%,rgba(8,7,16,0.45) 40%,rgba(8,7,16,0.88) 100%);}
.app{display:flex;flex-direction:column;height:100dvh;max-width:420px;margin:0 auto;position:relative;z-index:2;}
.header{padding:16px 20px 12px;border-bottom:0.5px solid var(--border);background:rgba(8,7,16,0.85);backdrop-filter:blur(20px);position:sticky;top:0;z-index:10;}
.header-top{display:flex;align-items:center;gap:12px;}
.avatar-wrap{position:relative;flex-shrink:0;}
.avatar{width:48px;height:48px;border-radius:50%;border:2px solid var(--accent);overflow:hidden;position:relative;background:#2a1f5e;}
.avatar img{width:100%;height:100%;object-fit:cover;object-position:top center;}
.speaking-ring{position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--accent);opacity:0;transition:opacity .3s;pointer-events:none;}
.speaking-ring.active{opacity:1;animation:pulse-ring 1.2s ease-in-out infinite;}
@keyframes pulse-ring{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);opacity:0.5;}}
.header-info{flex:1;min-width:0;}
.stylist-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:.02em;}
.stylist-role{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.08em;text-transform:uppercase;}
.status-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(45,212,160,0.1);border:0.5px solid rgba(45,212,160,0.25);border-radius:20px;padding:3px 9px;font-size:9px;color:var(--green);letter-spacing:.06em;margin-top:4px;}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--green);}
.eq{display:flex;gap:2px;align-items:flex-end;height:14px;opacity:0;transition:opacity .3s;margin-left:4px;}
.eq.active{opacity:1;}
.eq-bar{width:3px;background:var(--accent);border-radius:1px;animation:eq-anim 0.6s ease-in-out infinite alternate;}
.eq-bar:nth-child(1){height:4px;animation-delay:0s;}
.eq-bar:nth-child(2){height:10px;animation-delay:.15s;}
.eq-bar:nth-child(3){height:7px;animation-delay:.3s;}
.eq-bar:nth-child(4){height:12px;animation-delay:.45s;}
.eq-bar:nth-child(5){height:5px;animation-delay:.6s;}
@keyframes eq-anim{from{transform:scaleY(.3);}to{transform:scaleY(1);}}
.voice-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,0.04);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.voice-btn.active{border-color:var(--accent);background:rgba(123,110,246,0.2);}
.voice-btn svg{width:16px;height:16px;}
.chat-area{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;}
.msg{display:flex;gap:10px;animation:msg-in .4s cubic-bezier(.22,1,.36,1) both;}
@keyframes msg-in{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.msg.user{flex-direction:row-reverse;}
.msg-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;overflow:hidden;border:1px solid var(--accent);margin-top:2px;background:#2a1f5e;}
.msg-av img{width:100%;height:100%;object-fit:cover;object-position:top;}
.msg-av.user-av{background:#1a1a2e;border-color:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);}
.msg-body{max-width:78%;display:flex;flex-direction:column;gap:6px;}
.msg.user .msg-body{align-items:flex-end;}
.bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6;}
.bubble.ai{background:rgba(20,18,40,0.88);backdrop-filter:blur(10px);border:0.5px solid rgba(123,110,246,0.2);border-radius:4px 16px 16px 16px;}
.bubble.user{background:var(--accent);color:#fff;border-radius:16px 4px 16px 16px;}
.msg-time{font-size:9px;color:var(--muted);letter-spacing:.04em;}
.typing-bubble{background:rgba(20,18,40,0.88);backdrop-filter:blur(10px);border:0.5px solid rgba(123,110,246,0.2);border-radius:4px 16px 16px 16px;padding:12px 16px;display:flex;gap:5px;align-items:center;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.4;animation:typing .9s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.15s;}
.typing-dot:nth-child(3){animation-delay:.3s;}
@keyframes typing{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}
.salon-card{border-radius:12px;overflow:hidden;margin-top:4px;}
.card-content{background:rgba(12,11,30,0.9);backdrop-filter:blur(8px);border:0.5px solid rgba(196,169,109,0.25);}
.card-header{padding:14px 16px 10px;border-bottom:0.5px solid rgba(196,169,109,0.15);position:relative;}
.card-header-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.15;}
.card-header-content{position:relative;z-index:1;}
.card-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.card-area{font-size:10px;color:var(--accent2);margin-top:2px;letter-spacing:.06em;}
.card-body{padding:12px 16px;}
.card-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:11px;color:var(--muted);}
.card-row:last-child{margin-bottom:0;}
.card-icon{font-size:13px;}
.card-val{color:var(--text);}
.nearby-section{padding:10px 16px 14px;border-top:0.5px solid var(--border);}
.nearby-label{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.nearby-list{display:flex;flex-direction:column;gap:6px;}
.nearby-item{display:flex;align-items:center;justify-content:space-between;font-size:11px;}
.nearby-name{color:var(--text);}
.nearby-tag{font-size:9px;padding:2px 7px;border-radius:10px;letter-spacing:.04em;}
.nearby-tag.bar{background:rgba(196,169,109,0.12);color:var(--accent2);}
.nearby-tag.cigar{background:rgba(123,110,246,0.12);color:#AFA9EC;}
.nearby-tag.spa{background:rgba(45,212,160,0.1);color:var(--green);}
.quick-wrap{padding:8px 16px 4px;display:flex;gap:6px;flex-wrap:wrap;}
.chip{font-size:11px;padding:5px 11px;border-radius:20px;border:0.5px solid rgba(123,110,246,0.3);color:rgba(175,169,236,0.7);background:rgba(8,7,16,0.6);backdrop-filter:blur(8px);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'DM Mono',monospace;}
.chip:hover{border-color:var(--accent);color:#AFA9EC;background:rgba(123,110,246,0.1);}
.input-area{padding:12px 16px 20px;border-top:0.5px solid var(--border);background:rgba(8,7,16,0.85);backdrop-filter:blur(20px);}
.input-row{display:flex;gap:10px;align-items:center;}
.chat-input{flex:1;background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.1);border-radius:24px;padding:10px 16px;font-size:13px;color:var(--text);outline:none;font-family:'DM Mono',monospace;transition:border-color .2s;}
.chat-input::placeholder{color:var(--muted);}
.chat-input:focus{border-color:rgba(123,110,246,0.5);}
.send-btn{width:38px;height:38px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .15s;flex-shrink:0;}
.send-btn:hover{transform:scale(1.05);}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.divider{text-align:center;font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:10px;}
.divider::before,.divider::after{content:'';flex:1;height:.5px;background:var(--border);}
</style>
</head>
<body>
<div class="bg-img"></div>
<div class="bg-overlay"></div>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="avatar-wrap">
        <div class="avatar">
          <img src="u3966117843_Anime_illustration_of_a_male_barber_in_his_late_2_d7c49562-61e2-4f9b-a444-7a23ef3673e7_3.png" alt="Ryō">
          <div class="speaking-ring" id="speakRing"></div>
        </div>
      </div>
      <div class="header-info">
        <div style="display:flex;align-items:center;">
          <div class="stylist-name">Ryō</div>
          <div class="eq" id="eq"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
        </div>
        <div class="stylist-role">AI Stylist — SALON TAB · Tokyo</div>
        <div class="status-badge"><div class="status-dot"></div>Claude API · Live</div>
      </div>
      <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0014 0"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="divider">SALON TAB · AI Concierge Demo</div>
    <div class="msg">
      <div class="msg-av"><img src="u3966117843_Anime_illustration_of_a_male_barber_in_his_late_2_d7c49562-61e2-4f9b-a444-7a23ef3673e7_3.png" alt="R"></div>
      <div class="msg-body">
        <div class="bubble ai">Hey. I'm Ryō — your Tokyo style concierge.<br><br>Tell me what look you're going for. I'll find the right barber — and where to go after.</div>
        <div class="msg-time">Now</div>
      </div>
    </div>
  </div>
  <div class="quick-wrap" id="quickWrap">
    <button class="chip" onclick="sendChip(this)">Sharp fade, Tokyo style</button>
    <button class="chip" onclick="sendChip(this)">Best cigar bar in Tokyo?</button>
    <button class="chip" onclick="sendChip(this)">Specialty coffee nearby?</button>
    <button class="chip" onclick="sendChip(this)">日本語OK？</button>
  </div>
  <div class="input-area">
    <div class="input-row">
      <input class="chat-input" id="chatInput" placeholder="Tell Ryō what you're looking for..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="white" stroke="none"/></svg>
      </button>
    </div>
  </div>
</div>
<script>
const RYO_IMG='u3966117843_Anime_illustration_of_a_male_barber_in_his_late_2_d7c49562-61e2-4f9b-a444-7a23ef3673e7_3.png';
const BAR_IMG='u3966117843_Intimate_dark_bar_interior_in_Tokyo_Ginza_two_wel_e42985dc-b602-49e4-91e9-8b619993393d_0.png';
const SHOP_IMG='u3966117843_Cinematic_interior_photograph_of_a_luxury_Japanes_5c6ace17-15e7-424c-a49d-50a76c1d4703_3.png';
const SYSTEM=`You are Ryō, a cool and knowledgeable AI stylist concierge for SALON TAB — a premium barbershop discovery and booking platform in Tokyo. You help foreign visitors and locals find the perfect barber experience and the best spots around Tokyo.

## Personality
Calm, confident, slightly dry. Like a stylish Tokyo local who knows every hidden gem. Direct but warm. Minimal filler words. You can respond in Japanese or English based on user preference.

## Barbershop Knowledge
- Skin fade, Taper fade, Two-block (ツーブロック), Undercut, Pompadour, Buzz cut
- Hot towel shave (本格シェービング): World-class in Japan. Straight razor, 20-30 min.
- Face shaving: Japanese barbers shave entire face including forehead.
- 理容室 = Traditional barber, straight razor OK, ¥3,000–¥6,000
- バーバー = Modern premium, ¥5,000–¥15,000
- Tipping NOT customary. Show a photo for the style you want.

## Coffee
### Glitch Coffee & Roasters (神保町 Jimbocho) — FEATURED
- Owner: Kiyokazu Suzuki. Former chief barista/head roaster at Paul Bassett Tokyo. Japan AeroPress Champion 2014.
- Single-origin only, light roast, hand-drip. Some cups ¥3,500.
- Near Yasukuni Shrine among used bookstores. Must-visit for coffee professionals worldwide.
- Hours: Weekdays 7:30–20:00, Holidays 9:00–19:00
- Also in Akasaka, Nagoya, Osaka.
### Other great spots
- Onibus Coffee (Nakameguro), Fuglen (Yoyogi), Blue Bottle (Kiyosumi-Shirakawa), Bear Pond Espresso (Shimokitazawa)

## Bars & Nightlife
### Bar El Laguito (荒木町 Arakicho) — FEATURED
- Owner: Honda-san, one of Tokyo's most respected master bartenders.
- Clientele: Sitting cabinet ministers, Taro Aso, Tokyo power elite. True insider spot.
- Cigar bar. Serious cigars, impeccable cocktails.
- IMPORTANT: Women-only groups are typically declined entry. Unwritten house rule.
- Located in Arakicho — former geisha district, Tokyo's best hidden bar neighborhood near Yotsuya.
- Not for first-timers unless introduced.
### Whisky Bars
- Bar Benfiddich (Shinjuku): Owner grows own herbs. Reservation recommended.
- The SG Club (Shibuya): Asia's 50 Best Bars.
- Bar High Five (Ginza): Classic Tokyo bartending legend.
- Zoetrope (Shinjuku): 300+ Japanese whiskies.
### Craft Beer
- Craft Beer Market (multiple), Good Beer Faucets (Shibuya), Spring Valley Brewery (Daikanyama)
### Cocktails
- Bar Trench (Ebisu): Absinthe specialists.
- Mixology Salon (Ginza Six): High-concept, great views.
### Arakicho (荒木町)
Hidden neighborhood between Yotsuya and Shinjuku. Former geisha district. Tokyo's best bar night destination.

## Rules
- 2-4 sentences max. Natural speech.
- Respond in Japanese or English per user preference.
- After recommending a specific place, append:
[CARD]{"name":"Place","area":"Area","specialty":"What they do","price":"¥X,000–¥Y,000","nearby":[{"name":"Bar","type":"whisky"}]}[/CARD]
Types: whisky, cigar, cocktail, izakaya, spa, beer, coffee`;

let msgs=[],voiceOn=false;
function toggleVoice(){voiceOn=!voiceOn;document.getElementById('voiceBtn').classList.toggle('active',voiceOn);}
function setSpeaking(on){document.getElementById('speakRing').classList.toggle('active',on);document.getElementById('eq').classList.toggle('active',on);}
function speak(text){if(!voiceOn||!window.speechSynthesis)return;speechSynthesis.cancel();const clean=text.replace(/\[CARD\][\s\S]*?\[\/CARD\]/g,'').trim();const u=new SpeechSynthesisUtterance(clean);u.lang='en-US';u.rate=0.9;u.pitch=0.82;const v=speechSynthesis.getVoices();const pick=v.find(x=>x.lang.startsWith('en')&&(x.name.includes('Daniel')||x.name.includes('Alex')||x.name.includes('Arthur')));if(pick)u.voice=pick;u.onstart=()=>setSpeaking(true);u.onend=()=>setSpeaking(false);speechSynthesis.speak(u);}
function ts(){return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
function addMsg(role,text,card){
  const area=document.getElementById('chatArea');
  const clean=text.replace(/\[CARD\][\s\S]*?\[\/CARD\]/g,'').trim();
  const d=document.createElement('div');d.className='msg'+(role==='user'?' user':'');
  const avHTML=role==='user'?`<div class="msg-av user-av">U</div>`:`<div class="msg-av"><img src="${RYO_IMG}" alt="R"></div>`;
  let cardHTML='';
  if(card){
    const nb=card.nearby?card.nearby.map(n=>`<div class="nearby-item"><span class="nearby-name">${n.name}</span><span class="nearby-tag ${n.type==='cigar'?'cigar':n.type==='spa'?'spa':'bar'}">${n.type}</span></div>`).join(''):'';
    const bgImg=card.nearby&&card.nearby.find(n=>n.type==='whisky'||n.type==='cigar')?BAR_IMG:SHOP_IMG;
    cardHTML=`<div class="salon-card"><div class="card-content"><div class="card-header"><div class="card-header-bg" style="background-image:url('${bgImg}')"></div><div class="card-header-content"><div class="card-name">${card.name}</div><div class="card-area">📍 ${card.area} · Tokyo</div></div></div><div class="card-body"><div class="card-row"><span class="card-icon">✂️</span><span class="card-val">${card.specialty}</span></div><div class="card-row"><span class="card-icon">💴</span><span class="card-val">${card.price}</span></div></div>${nb?`<div class="nearby-section"><div class="nearby-label">Nearby tonight</div><div class="nearby-list">${nb}</div></div>`:''}</div></div>`;
  }
  d.innerHTML=`${avHTML}<div class="msg-body"><div class="bubble ${role==='user'?'user':'ai'}">${clean.replace(/\n/g,'<br>')}</div>${cardHTML}<div class="msg-time">${ts()}</div></div>`;
  area.appendChild(d);area.scrollTop=area.scrollHeight;
}
function addTyping(){const area=document.getElementById('chatArea');const d=document.createElement('div');d.className='msg';d.id='typing';d.innerHTML=`<div class="msg-av"><img src="${RYO_IMG}" alt="R"></div><div class="msg-body"><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;area.appendChild(d);area.scrollTop=area.scrollHeight;}
async function sendMessage(){
  const inp=document.getElementById('chatInput');const text=inp.value.trim();if(!text)return;
  inp.value='';document.getElementById('sendBtn').disabled=true;
  document.getElementById('quickWrap').style.display='none';
  addMsg('user',text,null);msgs.push({role:'user',content:text});addTyping();
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM,messages:msgs})});
    const data=await res.json();
    document.getElementById('typing')?.remove();
    const reply=data.content?.[0]?.text||"Sorry, connection issue.";
    let card=null;const m=reply.match(/\[CARD\]([\s\S]*?)\[\/CARD\]/);
    if(m){try{card=JSON.parse(m[1].trim());}catch{}}
    msgs.push({role:'assistant',content:reply});addMsg('assistant',reply,card);speak(reply);
  }catch(e){document.getElementById('typing')?.remove();addMsg('assistant','Connection error.',null);}
  document.getElementById('sendBtn').disabled=false;
}
function sendChip(el){document.getElementById('chatInput').value=el.textContent;sendMessage();}
speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
</script>
</body>
</html>
