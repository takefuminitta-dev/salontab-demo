<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SALON TAB — Ryō AI Stylist</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080710;--border:rgba(255,255,255,0.07);--accent:#7B6EF6;--accent2:#C4A96D;--text:rgba(255,255,255,0.88);--muted:rgba(255,255,255,0.35);--green:#2DD4A0;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow:hidden;overflow-x:hidden;}
.app{display:flex;flex-direction:column;height:100dvh;width:100%;max-width:480px;margin:0 auto;overflow:hidden;}
.header{padding:16px 20px 12px;border-bottom:0.5px solid var(--border);background:rgba(8,7,16,0.95);position:sticky;top:0;z-index:10;flex-shrink:0;}
.header-top{display:flex;align-items:center;gap:12px;}
.avatar{width:48px;height:48px;border-radius:50%;border:2px solid var(--accent);background:linear-gradient(135deg,#2a1f5e,#534AB7);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:18px;color:#fff;flex-shrink:0;position:relative;}
.speaking-ring{position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--accent);opacity:0;transition:opacity .3s;}
.speaking-ring.active{opacity:1;animation:pulse-ring 1.2s ease-in-out infinite;}
@keyframes pulse-ring{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);opacity:0.5;}}
.header-info{flex:1;min-width:0;}
.stylist-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
.stylist-role{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.08em;text-transform:uppercase;}
.status-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(45,212,160,0.1);border:0.5px solid rgba(45,212,160,0.25);border-radius:20px;padding:3px 9px;font-size:9px;color:var(--green);margin-top:4px;}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--green);}
.eq{display:flex;gap:2px;align-items:flex-end;height:14px;opacity:0;transition:opacity .3s;margin-left:4px;}
.eq.active{opacity:1;}
.eq-bar{width:3px;background:var(--accent);border-radius:1px;animation:eq-anim 0.6s ease-in-out infinite alternate;}
.eq-bar:nth-child(1){height:4px;animation-delay:0s;}
.eq-bar:nth-child(2){height:10px;animation-delay:.15s;}
.eq-bar:nth-child(3){height:7px;animation-delay:.3s;}
.eq-bar:nth-child(4){height:12px;animation-delay:.45s;}
.eq-bar:nth-child(5){height:5px;animation-delay:.6s;}
@keyframes eq-anim{from{transform:scaleY(.3);}to{transform:scaleY(1);}}
.voice-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,0.04);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.voice-btn.active{border-color:var(--accent);background:rgba(123,110,246,0.2);}
.voice-btn svg{width:18px;height:18px;}
.chat-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 16px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch;}
.msg{display:flex;gap:10px;animation:msg-in .4s cubic-bezier(.22,1,.36,1) both;width:100%;}
@keyframes msg-in{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.msg.user{flex-direction:row-reverse;}
.msg-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#2a1f5e,#534AB7);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;margin-top:2px;}
.msg-av.user-av{background:#1a1a2e;border-color:rgba(255,255,255,0.15);}
.msg-body{max-width:calc(100% - 48px);display:flex;flex-direction:column;gap:6px;min-width:0;}
.msg.user .msg-body{align-items:flex-end;}
.bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6;word-break:break-word;overflow-wrap:break-word;}
.bubble.ai{background:#141228;border:0.5px solid rgba(123,110,246,0.2);border-radius:4px 16px 16px 16px;}
.bubble.user{background:var(--accent);color:#fff;border-radius:16px 4px 16px 16px;}
.msg-time{font-size:9px;color:var(--muted);}
.typing-bubble{background:#141228;border:0.5px solid rgba(123,110,246,0.2);border-radius:4px 16px 16px 16px;padding:12px 16px;display:flex;gap:5px;align-items:center;}
